name: Pinact Pin (Dependabot)

on:
    pull_request_target:
        paths:
            - ".github/workflows/**"
            - ".github/actions/**"

permissions:
    contents: write

jobs:
    pin:
        name: pin SHA references on Dependabot PRs
        if: github.actor == 'dependabot[bot]'
        runs-on: ubuntu-latest-2-core
        steps:
            - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
              with:
                  ref: ${{ github.head_ref }}
                  token: ${{ secrets.PINACT_PAT }}

            - uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
              with:
                  skip_push: "false"
              env:
                  GITHUB_TOKEN: ${{ secrets.PINACT_PAT }}
